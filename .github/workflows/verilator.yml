name: Verilator Regression

on: [push]

jobs:
  verilator-test:
    runs-on: ubuntu-latest
    container:
      image: verilator/verilator:v5.042

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --python 3.11

      - name: Run regression
        run: uv run rtl-buddy -B verilator regression
